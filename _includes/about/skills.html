<div class="col-lg">

  <h4 class="mb-3">{{ include.title }}</h4>

  {% for skill in include.source %}

  <!-- Skill label row -->
  <div class="d-flex justify-content-between align-items-center skill-label">
    <span class="skill-name">{{ skill.name }}</span>
    <span class="skill-level text-muted">{{ skill.level }}</span>
  </div>

  <!-- Progress wrapper (controls total width) -->
  <div class="skill-progress-wrapper mb-4">
    <div class="progress skill-progress">
      <div
        class="progress-bar skill-bar"
        role="progressbar"
        data-percentage="{{ skill.percentage }}"
        style="width: 0%; background-color: var(--global-theme-color);"
        aria-valuenow="{{ skill.percentage }}"
        aria-valuemin="0"
        aria-valuemax="100">
      </div>
    </div>
  </div>

  {% endfor %}

</div>
